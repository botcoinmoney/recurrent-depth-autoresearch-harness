environment:
  profile: h100_8gpu
  gpus: 8
  gpu_type: H100_80GB_or_better
  python_min: "3.11"
  required_env:
    - HF_HOME
    - TRANSFORMERS_CACHE
  recommended_env:
    HF_HOME: $HOME/.cache/huggingface
    TRANSFORMERS_CACHE: $HOME/.cache/huggingface
    HUGGINGFACE_HUB_CACHE: $HOME/.cache/huggingface
  protected_defaults:
    keep_one_gpu_available_for_eval_or_output_gate: true
    forbid_adapter_merge: true
    require_frequent_pushes: true
    require_findings_log: true
  wake_cadence_minutes:
    setup: 2
    dataset_build: 5
    benchmark: 10
    training: 5
    output_gate: 2

